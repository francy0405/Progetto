# =====================================================================
#  docker-compose.yml  —  IL "DIRETTORE D'ORCHESTRA"
# =====================================================================
#
# Il Dockerfile costruisce UN solo contenitore (la nostra app).
# Ma la nostra applicazione ha bisogno di DUE pezzi che lavorano insieme:
#   1) il database PostgreSQL (dove salviamo corrieri e recensioni);
#   2) l'app Flask (che risponde alle richieste).
#
# Questo file li accende ENTRAMBI con un solo comando ("docker compose up")
# e li mette in comunicazione tra loro. E' come il direttore d'orchestra
# che fa partire tutti gli strumenti al momento giusto.

services:

  # -------------------------------------------------------------------
  # SERVIZIO 1: il database PostgreSQL
  # -------------------------------------------------------------------
  db:
    image: postgres:18   # usiamo l'immagine ufficiale di PostgreSQL, versione 18
    environment:
      # Utente, password e nome del database. I valori NON sono scritti qui:
      # arrivano dal file .env (la sintassi ${...} li legge da li'). Cosi'
      # i dati sensibili restano fuori dal codice condiviso.
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      # Un "volume" e' uno spazio su disco che sopravvive al contenitore:
      # cosi' se spegniamo e riaccendiamo, i dati del database NON si perdono.
      # (da PostgreSQL 18 in poi il mount va su /var/lib/postgresql)
      - pgdata:/var/lib/postgresql
      # Questa cartella "init" viene eseguita UNA SOLA VOLTA, alla primissima
      # creazione del database: serve a caricare il dump iniziale (le tabelle
      # e i corrieri di esempio). ":ro" = sola lettura, non la modifichiamo.
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      # Un "controllo di salute": Docker chiede ripetutamente al database
      # "sei pronto a ricevere connessioni?". Serve per non far partire l'app
      # prima che il database sia davvero in piedi (vedi "depends_on" sotto).
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE}"]
      interval: 5s   # ricontrolla ogni 5 secondi
      timeout: 5s    # aspetta al massimo 5 secondi per ogni tentativo
      retries: 10    # dopo 10 tentativi falliti, si arrende

  # -------------------------------------------------------------------
  # SERVIZIO 2: la nostra app Flask
  # -------------------------------------------------------------------
  web:
    build: .   # costruiscila seguendo il Dockerfile che sta in questa cartella
    depends_on:
      db:
        # L'app parte SOLO quando il database e' "service_healthy", cioe' ha
        # superato il controllo di salute. Senza questa attesa, l'app potrebbe
        # avviarsi troppo presto e fallire perche' il database non c'e' ancora.
        condition: service_healthy
    environment:
      # Diciamo all'app come trovare il database. Nota la cosa importante:
      # l'host NON e' un indirizzo IP ma "db", cioe' il nome del servizio qui
      # sopra. Dentro la rete di Docker Compose i servizi si chiamano per nome.
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      HOST: 0.0.0.0   # l'app ascolta da qualsiasi indirizzo (necessario in Docker)
      PORT: 5000
    ports:
      # Colleghiamo la porta 5000 del nostro PC alla porta 5000 del contenitore.
      # Cosi' aprendo "localhost:5000" nel browser raggiungiamo l'app.
      - "5000:5000"

# Qui dichiariamo il volume usato sopra per la persistenza dei dati del database.
volumes:
  pgdata:
